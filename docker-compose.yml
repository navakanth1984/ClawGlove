version: "3.9"

# ClawGlove local development infrastructure
# Starts: Kafka (Redpanda), etcd, OpenTelemetry Collector, Jaeger UI
# Run: docker compose up -d
# Stop: docker compose down

networks:
  clawglove_sidecar_net:
    driver: bridge
    # This is the ONLY network agent containers may access.
    # Agent containers get no default gateway — only this network.

services:

  # -----------------------------------------------------------------
  # Redpanda — Kafka-compatible broker (lighter than full Kafka)
  # -----------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v23.3.1
    container_name: clawglove_redpanda
    networks: [clawglove_sidecar_net]
    ports:
      - "9092:9092"    # Kafka API
      - "9644:9644"    # Admin API
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # etcd — distributed consensus and state checkpoints
  # -----------------------------------------------------------------
  etcd:
    image: bitnami/etcd:3.5
    container_name: clawglove_etcd
    networks: [clawglove_sidecar_net]
    ports:
      - "2379:2379"
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://0.0.0.0:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # OpenTelemetry Collector — receives spans and metrics from sidecar
  # -----------------------------------------------------------------
  otel_collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: clawglove_otel
    networks: [clawglove_sidecar_net]
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Prometheus metrics
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]

  # -----------------------------------------------------------------
  # Jaeger — trace visualisation UI
  # Open http://localhost:16686 to view ClawGlove governance traces
  # -----------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: clawglove_jaeger
    networks: [clawglove_sidecar_net]
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
